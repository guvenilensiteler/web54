      .banner img:not([loaded]) {

      .split-banner {

        display: flex;
        flex-wrap: wrap;

        justify-content: center;
      }

      #cards1>.card {
        flex: 0 0 calc(20% - 8px);
        box-sizing: border-box;
        min-height: 150px; /* Skeleton height */
        background: #2a2a2a; /* Skeleton background */
      }

      /* Skeleton loading animation */
      @keyframes shimmer {
        0% {
          background-position: -1000px 0;
        }
        100% {
          background-position: 1000px 0;
        }
      }

      .skeleton {
        animation: shimmer 2s infinite linear;
        background: linear-gradient(to right, #2a2a2a 4%, #3a3a3a 25%, #2a2a2a 36%);
        background-size: 1000px 100%;
      }

      img {
        transition: opacity 0.3s ease;
      }

      img:not([loaded]) {
        opacity: 0;
      }

      img[loaded] {
        opacity: 1;
      }

      .card-container {
        display: flex;
        gap: 20px;
      }

      .rectangle2 {
        position: relative;
        border: 2px solid transparent;
        animation: glowingBorder2 4.2s infinite;
        border-radius: 32px;
      }

      /* Delays for sequential glowing and fading, adjusted for 1.5s duration */
      /*START*/
      .rectangle2:nth-child(1) {
        animation-delay: 0s;
      }

      .rectangle2:nth-child(2) {
        animation-delay: 0.375s;
      }

      .rectangle2:nth-child(3) {
        animation-delay: 0.75s;
      }

      .rectangle2:nth-child(4) {
        animation-delay: 1.125s;
      }

      .rectangle2:nth-child(5) {
        animation-delay: 1.5s;
      }

      .rectangle2:nth-child(6) {
        animation-delay: 1.875s;
      }

      .rectangle2:nth-child(7) {
        animation-delay: 2.25s;
      }

      .rectangle2:nth-child(8) {
        animation-delay: 2.625s;
      }

      .rectangle2:nth-child(9) {
        animation-delay: 3s;
      }

      /*END*/
      @keyframes glowingBorder2 {
        0% {
          box-shadow: none;
          border-color: transparent;
        }

        12.5% {
          box-shadow: 0 0 3px #00ffcc, 0 0 6px #00ffcc, 0 0 9px #00ffcc;

        25% {

        }

        50% {

          border-color: transparent;
        }

        100% {

          border-color: transparent;

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        // Lazy loading implementation
        const images = document.querySelectorAll('img');
        
        const imageObserver = new IntersectionObserver((entries, observer) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const img = entry.target;
              if (!img.src.includes('data:image')) {
                const src = img.getAttribute('data-src') || img.src;
                img.src = src;
                img.classList.add('skeleton');
                
                img.onload = function() {
                  img.setAttribute('loaded', '');
                  img.classList.remove('skeleton');
                }
                
                observer.unobserve(img);
              }
            }
          });
        }, {
          rootMargin: '50px 0px',
          threshold: 0.01
        });

        images.forEach(img => {
          if (!img.complete) {
            img.classList.add('skeleton');
          }
          
          if (!img.hasAttribute('data-src')) {
            img.setAttribute('data-src', img.src);
          }
          
          imageObserver.observe(img);
        });
      });

      // ek istek
      window.onload = function() {
        document.querySelector('.banner:has(img[alt="kralbet"])').classList.add('rectangle2');
        document.querySelector('.banner:has(img[alt="kralbet"])').style.borderRadius = '5px';
      }
    </script>
