    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let url = new URL(window.location.href);
            let params = new URLSearchParams(url.search);
            if (params.has('islem') || params.has('mesaj') ) {
                if (typeof Swal !== 'undefined') {
                    Swal.fire({
                        icon: params.get('islem'),
                        title: 'Bilgi',
                        text: decodeURIComponent(params.get('mesaj')), // Unutma! text: olmak zorunda! html: yaparsan XSS oluşur..
                    }).then(() => {
                        window.history.pushState({}, document.title, document.URL.split("?")[0]);

            }
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                return true;
            }

                return true;
            }
            return false;
        }

<script>
    const today = new Date();
    const tomorrow = new Date(today);
    tomorrow.setDate(today.getDate() + 1);
    tomorrow.setHours(07, 00, 00, 0); // Set to 07:00:00.000 // TO DO: Beni panele bagla

    const daysEl = document.getElementById('days');
    const hoursEl = document.getElementById('hours');
    const minutesEl = document.getElementById('minutes');
    const secondsEl = document.getElementById('seconds');
    function updateCountdown() {
        const now = new Date();
        const diff = tomorrow - now;

        if (diff <= 0) {
            // Bittiğinde
            daysEl.textContent = "00";
            hoursEl.textContent = "00";
            minutesEl.textContent = "00";
            secondsEl.textContent = "00";
            window.location.reload();
            return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        daysEl.textContent = days.toString().padStart(2, '0');
        hoursEl.textContent = hours.toString().padStart(2, '0');
        minutesEl.textContent = minutes.toString().padStart(2, '0');
        secondsEl.textContent = seconds.toString().padStart(2, '0');

        // Add pulse effect to seconds
        secondsEl.style.color = 'var(--accent-color)';
        setTimeout(() => {
            secondsEl.style.color = 'var(--text-color)';
        }, 500);
    }
    // Initialize countdown
    updateCountdown();
    setInterval(updateCountdown, 1000);

    // Mousemove effect for countdown numbers
    document.querySelectorAll('.countdown-number').forEach(box => {
        box.addEventListener('mouseover', function() {
            this.style.transform = 'scale(1.05)';
            this.style.backgroundColor = '#2A2A2A';
            this.style.transition = 'all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        });

        box.addEventListener('mouseout', function() {
            this.style.transform = 'scale(1)';
            this.style.backgroundColor = 'var(--surface-color)';
        });
    });
</script>

                        templateSelection: formatOption, // Seçilen seçeneğin görünümü
                        minimumResultsForSearch: -1      // Arama çubuğunu devre dışı bırakır
                    });
                    function formatOption(option) {
                        if (!option.id) {
                            return option.text; // Placeholder veya boş seçenek için
                        }
                        var img = $(option.element).data('img');
                        var $option = $(
                            '<span><img src="' + img + '" /> ' + option.text + '</span>'
                        );
                        return $option;
                    }

                    // Textarea
                    // bu sırf css-field-sizing eski tarayıcılarda desteklemiyor diye yazılmış bir JS
                    for (let t of document.querySelectorAll('textarea.custom-swal-textarea')) {
                        t.addEventListener('input', function (e) {
                            e = e.target;
                            if (e.value=='') {
                                e.style.height = '40px';
                                e.style.overflowY = 'hidden';
                                return;
                            }
                            e.style.overflowY = 'atuo';
                            e.style.height = 'auto';
                            e.style.height = this.scrollHeight+'px';
                        });
                    }

                    // Textarea Placeholder
                    $('#odeme_yontemi').on('select2:select', function(e) {
                        const placeholders = {
                            '2': 'Papara Hesap No',
                            '3': 'IBAN Numaranız',
                        };
                        $('#odeme_cuzdan').attr('placeholder', placeholders[this.value] || 'Cüzdan Numaranız');
                        $('#odeme_adsoyad')[(this.value==3? 'remove' : 'add')+'Class']('d-none');
                        $('#odeme_adsoyad').prop('required',this.value==3);
                    });

                    // onSubmit (bu kısım işlev kazanmadı ama olsun yazzdık o kadar dursun bari)
                    form = document.querySelector('.swal-container form');
                    form.addEventListener('submit', function (e) {
                        if (!form.checkValidity()) {
                            e.preventDefault();
                            Swal.showValidationMessage('Lütfen zorunlu alanları doldurun!');
                        }
                    });

                    return Promise.resolve();
                }
            });
        }
        else if (x == 'basarisiz')
        {
            FingerprintJS.load().then(fp => {
                fp.get().then(result => {
                    const xhr_again = new XMLHttpRequest();
                    xhr_again.open('POST', 'https://ogedaybonuslari.com/api/getClaim.php', false); // Senkron istek
                    xhr_again.setRequestHeader('Content-Type', 'application/json');
                    xhr_again.send(JSON.stringify({
                        f: result.visitorId
                    }));
                    if (xhr_again.status === 200) {
                        try {
                            responseData = JSON.parse(xhr_again.responseText);
                            kalan_hak = responseData.hak;
                            xhr_again_after(Number(responseData.durum));
                        } catch (parseError) {
                            console.error('JSON parse hatası:', parseError);
                            console.error('Yanıt içeriği:', xhr.responseText);
                            xhr_again_after(0);
                        }
                    } else {
                        xhr_again_after(0);
                    }
                });
            });
            function xhr_again_after(zar_atabilir_mi) {
                iki_mi = false;
                if (zar_atabilir_mi == 2) {
                    zar_atabilir_mi = 0;
                    iki_mi = true;
                }
                Swal.fire({
                    title: 'BAŞARAMADIK ABİ',
                    // '<video autoplay playsinline style="width:370px;"><source src="images/basaramadik.mp4" type="video/mp4" /></video><br>'+
                    html: (zar_atabilir_mi? 'Şansınızı tekrar deneyebilirsiniz.' : 'Yarın tekrar denemeyi unutmayın.'),
                    customClass: {
                        popup: 'custom-swal-popup basarisiz',
                        title: 'custom-swal-title',
                        htmlContainer: 'custom-swal-text'
                    },
                    backdrop: 'rgba(0,0,0,0.0)',
                    //allowOutsideClick: true,
                    showConfirmButton: zar_atabilir_mi,
                    confirmButtonText: '\n' +
                        '<?xml version="1.0" encoding="utf-8"?>\n' +
                        '<svg style="vertical-align: middle" width="25px" height="25px" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" fill="#FFFFFF"><path fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" d="M448,341.37V170.61A32,32,0,0,0,432.11,143l-152-88.46a47.94,47.94,0,0,0-48.24,0L79.89,143A32,32,0,0,0,64,170.61V341.37A32,32,0,0,0,79.89,369l152,88.46a48,48,0,0,0,48.24,0l152-88.46A32,32,0,0,0,448,341.37Z"/><polyline fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" points="69 153.99 256 263.99 443 153.99"/><line fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" x1="256" y1="463.99" x2="256" y2="263.99"/><ellipse cx="256" cy="152" rx="24" ry="16"/><ellipse cx="208" cy="296" rx="16" ry="24"/><ellipse cx="112" cy="328" rx="16" ry="24"/><ellipse cx="304" cy="296" rx="16" ry="24"/><ellipse cx="400" cy="240" rx="16" ry="24"/><ellipse cx="304" cy="384" rx="16" ry="24"/><ellipse cx="400" cy="328" rx="16" ry="24"/></svg>Zarları Tekrar At\n' +
                        '<span style="background:gold; color:black; font-weight:bold; padding:1px; border-radius:3px; margin-left:2px;">Kalan Hak: '+kalan_hak+'</span>',
                    showCancelButton: true,
                    cancelButtonText: zar_atabilir_mi? 'Vazgeç' : 'Tamam',
                    cancelButtonColor: zar_atabilir_mi? '' : '#FFC107',
                    didOpen: () => {
                        //document.querySelector('.swal2-container').style.pointerEvents = 'none';
                        //document.querySelector('.swal2-popup').style.pointerEvents = 'auto';
                    }
                }).then((result) => {
                    if (result.isConfirmed) {
                        if (zar_atabilir_mi) {
                            closeModal();
                            openModal();
                        } else {
                            window.location.reload();
                        }
                    } else {
                        window.location.reload();
                    }
                });
            }
        }
        else
        {
            function isObject(value) {
                return value !== null && typeof value === 'object' && !Array.isArray(value);
            }
            if (!isObject(x)) {
                Swal.fire({
                    icon: 'error',
                    title: 'HATAx',
                    text: x,
                    confirmButtonText: 'Tamam'
                }).then(() => {
                    closeModal();
                });
            }
        }
    }
    window.addEventListener('message', (event) => {
        if (['basarili','basarisiz','Teknik bir hata olustu. Lütfen daha sonra tekrar deneyiniz. (1).'].indexOf(event.data) > -1) {
            showCustomAlert(event.data);
        }
    });
