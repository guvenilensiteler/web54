<!doctype html>
<html lang="tr">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

    <style>
        body {
            background-size: 1em 1em;
            background: radial-gradient(circle, #6b6e3e 10%, transparent 11%) #1c1c1c;
            background-size: 1em 1em;
            padding: 14px 0;
        }
        .container {
            max-width: 940px;
        }
        .row-cols-2 .col:first-child,
        .row-cols-3 .col:first-child {
            padding-right: 4px;
        }
        .row-cols-2 .col:last-child,
        .row-cols-3 .col:last-child{
            padding-left: 4px;
        }

        .viplerim {
            background-image: url("./images/bg-viplerim.png");
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            padding: 44px 8px 8px 8px;
            margin: 10px 0;
        }
        @media (max-width: 768px) {
            .viplerim .col:nth-child(1),
            .viplerim .col:nth-child(2),
            .viplerim .col:nth-child(3)
            {
                margin-top: -14px;
            }
            .viplerim .col:last-child {
                margin-bottom: 2px !important;
            }
        }



        /* ÖZEL STİL */
        .rectangle2 {
            position: relative;
            border: 2px solid transparent;
            animation: glowingBorder2 4.2s infinite;
            border-radius: 32px;
        }

        /*START*/
        .row-cols-5 .rectangle-area:nth-child(1) .rectangle2 {
            animation-delay: 0s;
        }
        .row-cols-5 .rectangle-area:nth-child(2) .rectangle2 {
            animation-delay: 0.375s;
        }
        .row-cols-5 .rectangle-area:nth-child(3) .rectangle2 {
            animation-delay: 0.75s;
        }
        .row-cols-5 .rectangle-area:nth-child(4) .rectangle2 {
            animation-delay: 1.125s;
        }
        .row-cols-5 .rectangle-area:nth-child(5) .rectangle2 {
            animation-delay: 1.5s;
        }
        .row-cols-5 .rectangle-area:nth-child(6) .rectangle2 {
            animation-delay: 1.875s;
        }
        .row-cols-5 .rectangle-area:nth-child(7) .rectangle2 {
            animation-delay: 2.25s;
        }
        .row-cols-5 .rectangle-area:nth-child(8) .rectangle2 {
            animation-delay: 2.625s;
        }
        .row-cols-5 .rectangle-area:nth-child(9) .rectangle2 {
            animation-delay: 3s;
        }
        /*END*/

        @keyframes glowingBorder2 {
            0% {
                box-shadow: none;
                border-color: transparent;
            }
            12.5% {
                box-shadow: 0 0 3px #00ffcc, 0 0 6px #00ffcc, 0 0 9px #00ffcc;
                border-color: #00ffcc;
            }
            25% {
                box-shadow: 0 0 6px #ff00ff, 0 0 9px #ff00ff, 0 0 12px #ff00ff;
                border-color: #ff00ff;
            }
            37.5% {
                box-shadow: 0 0 3px #00ffcc, 0 0 6px #00ffcc, 0 0 9px #00ffcc;
                border-color: #00ffcc;
            }
            50% {
                box-shadow: none;
                border-color: transparent;
            }
            100% {
                box-shadow: none;
                border-color: transparent;
            }
        }
    </style>
</head>
<body>

<div class="container text-center">
    <div class="row row-cols-1">

            <img src="./images/banner/misty.png" class="img-fluid">

        </div>
        <div class="col mb-2">

        </div>
        <div class="col mb-2">
            <img src="./images/banner/mersobahis.gif" class="img-fluid">
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js" integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V" crossorigin="anonymous"></script>
</body>
