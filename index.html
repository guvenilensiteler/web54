    <style>
        .card-container {

            gap: 20px;
        }
        .rectangle2 {
            position: relative;
            border: 2px solid transparent;
            animation: glowingBorder2 4.2s infinite;
            border-radius: 32px;
        }
        /* Delays for sequential glowing and fading, adjusted for 1.5s duration */
        /*START*/.rectangle2:nth-child(1) {
                    animation-delay: 0s;
                }.rectangle2:nth-child(2) {
                    animation-delay: 0.375s;
                }.rectangle2:nth-child(3) {
                    animation-delay: 0.75s;
                }.rectangle2:nth-child(4) {
                    animation-delay: 1.125s;
                }.rectangle2:nth-child(5) {
                    animation-delay: 1.5s;
                }.rectangle2:nth-child(6) {
                    animation-delay: 1.875s;
                }.rectangle2:nth-child(7) {
                    animation-delay: 2.25s;
                }.rectangle2:nth-child(8) {
                    animation-delay: 2.625s;
                }.rectangle2:nth-child(9) {
                    animation-delay: 3s;
                }/*END*/

        @keyframes glowingBorder2 {
            0% {
                box-shadow: none;
                border-color: transparent;
            }
            12.5% {
                box-shadow: 0 0 3px #00ffcc, 0 0 6px #00ffcc, 0 0 9px #00ffcc;
                border-color: #00ffcc;
            }
            25% {
                box-shadow: 0 0 6px #ff00ff, 0 0 9px #ff00ff, 0 0 12px #ff00ff;
                border-color: #ff00ff;
            }
            37.5% {
                box-shadow: 0 0 3px #00ffcc, 0 0 6px #00ffcc, 0 0 9px #00ffcc;
                border-color: #00ffcc;
            }
            50% {
                box-shadow: none;
                border-color: transparent;
            }
            100% {
                box-shadow: none;
                border-color: transparent;
            }
        }
    </style>

        @keyframes MyRotate {
            0% {

        .shiny {

            position: absolute;
            inset: 50% -70% -70% 50%;
            transition: all 300ms ease;
            background: linear-gradient(
                    to left,
                    transparent,
                    #ffffff,
                    var(--shiny-color),
                    transparent 100%
            ) no-repeat;
            transform-origin: 0 0;
        }
        /*shiny_start*/
		.shiny.s1 { --shiny-color: #ff1376; }
		.shiny.s2 { --shiny-color: #ff9612; }
		.shiny.s3 { --shiny-color: #1fe1ff; }

		.shiny.s5 { --shiny-color: #00c683; }
		.shiny.s6 { --shiny-color: #ce5024; }
		/*shiny_end*/
        .wrapper .shiny {
            animation: MyRotate 2s infinite linear;
        }
    </style>
